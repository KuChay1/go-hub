<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Go Hub</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Go Hub">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1 class="logo"><span class="lg1">Go</span><span class="lg2">Hub</span></h1>
  <div id="hdrRight">
    <span id="lastSync"></span>
    <button class="iconBtn" id="refreshBtn" aria-label="Refresh">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>
    </button>
  </div>
</header>

<div id="ptr">↻ Refreshing…</div>

<main id="panels">
  <section class="panel" id="p-home"></section>
  <section class="panel" id="p-raids"></section>
  <section class="panel" id="p-research"></section>
  <section class="panel" id="p-showcase"></section>
  <section class="panel" id="p-news"></section>
  <section class="panel" id="p-settings"></section>
</main>

<nav id="tabbar">
  <button data-tab="0" class="active"><span class="ti">🏠</span>Home</button>
  <button data-tab="1"><span class="ti">⚔️</span>Raids</button>
  <button data-tab="2"><span class="ti">🔍</span>Research</button>
  <button data-tab="3"><span class="ti">🏆</span>Showcase</button>
  <button data-tab="4"><span class="ti">📰</span>News</button>
  <button data-tab="5"><span class="ti">⚙️</span>Settings</button>
</nav>

<div id="modal">
  <div id="modalCard" class="modalWrap"></div>
</div>

<script src="app.js"></script>
</body>
</html>
